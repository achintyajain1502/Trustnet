<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRUSTNET 2026 – Admin Dashboard</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{margin:0;background:#eef1f6;padding:40px}
.top-header{
  background:#fff;height:80px;display:flex;
  justify-content:space-between;align-items:center;
  padding:0 40px;box-shadow:0 4px 15px rgba(0,0,0,.08);
  margin:-40px -40px 40px
}
.logout{color:#2563EB;font-weight:700;text-decoration:none}
.admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:40px}
.full-width{grid-column:1/-1}
.card{
  background:#fff;border-radius:16px;padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,.08)
}
.card h2{color:#2563EB;margin:0}
.hr{border-bottom:1px solid #dbeafe;margin:20px 0}
input{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #ccc}
.btn{background:#2563EB;color:#fff;border:none;padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-outline{background:#2563EB;color:#fff;border:none;padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer;white-space: nowrap;}
.simple-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid #eee;gap:20px
}
.simple-item img{
  height:40px;width:40px;border-radius:5px;margin-right:10px;object-fit:cover;
}
.item-info{display:flex;align-items:center;gap:10px;}
.simple-item div:last-child {
  display:flex;
  gap:10px;
  flex-shrink:0;
}
</style>
</head>

<body>

<div class="top-header">
  <h1>TRUSTNET 2026 – Admin Dashboard</h1>
  <a href="#" class="logout" onclick="logout()">LOGOUT</a>
</div>

<div class="admin-grid">

<!-- IMPORTANT DATES -->
<div class="card">
<h2>Important Dates</h2><div class="hr"></div>
<input id="eventName" placeholder="Event Name">
<input id="eventDate" placeholder="Date (YYYY-MM-DD)">
<button class="btn" onclick="addDate()">Add</button>
<div class="hr"></div><div id="datesList"></div>
</div>

<!-- SPEAKERS -->
<div class="card">
<h2>Speakers</h2><div class="hr"></div>
<input id="spName" placeholder="Name">
<input id="spAff" placeholder="Affiliation">
<input type="file" id="spImg">
<button class="btn" onclick="addSpeaker()">Add</button>
<div class="hr"></div><div id="speakerList"></div>
</div>

<!-- COMMITTEE -->
<div class="card">
<h2>Committee</h2><div class="hr"></div>
<input id="cmName" placeholder="Name">
<input id="cmDes" placeholder="Designation">
<input type="file" id="cmImg">
<button class="btn" onclick="addCommittee()">Add</button>
<div class="hr"></div><div id="CommitteeList"></div>
</div>

<!-- PUBLISHERS -->
<div class="card full-width">
<h2>Publishers</h2><div class="hr"></div>
<input id="pubName" placeholder="Publisher Name">
<input type="file" id="pubLogo">
<button class="btn" onclick="addPublisher()">Add</button>
<div class="hr"></div><div id="publisherList"></div>
</div>

<!-- PARTNERS -->
<div class="card full-width">
<h2>Partners</h2><div class="hr"></div>
<input id="partnerName" placeholder="Partner Name">
<input type="file" id="partnerLogo">
<button class="btn" onclick="addPartner()">Add</button>
<div class="hr"></div><div id="partnerList"></div>
</div>

<!-- NAVIGATION TABS -->
<div class="card full-width">
  <h2>Navigation Tabs</h2>
  <div class="hr"></div>

  <input id="tabName" placeholder="Tab Name">
  <input id="headline" placeholder="Headline">
  <textarea id="content" placeholder="Content"
    style="width:100%;height:120px;padding:12px;border-radius:10px;border:1px solid #ccc;margin-bottom:12px;"></textarea>
  <input type="file" id="image">

  <button class="btn" onclick="addTab()">Add</button>

  <div class="hr"></div>
  <div id="tabList"></div>
</div>

</div>

<script>
function showToast(msg, success=true){
  const toast = document.getElementById("toast");
  if(!toast) return;
  toast.innerText = msg;
  toast.style.background = success ? "#16a34a" : "#dc2626";
  toast.style.display = "block";
  toast.style.opacity = 1;
  setTimeout(()=>{
    toast.style.transition = "opacity 0.5s";
    toast.style.opacity = 0;
    setTimeout(()=> toast.style.display="none", 500);
  }, 3000);
}

// IMAGE PREVIEW
function previewImage(input, previewId){
  const file = input.files[0];
  const preview = document.getElementById(previewId);
  if(file && preview){
    preview.src = URL.createObjectURL(file);
  }
}
let editMode = { type: null, id: null };

// LOGIN
if(sessionStorage.getItem("adminLoggedIn")!=="true"){ location.href="login.html"; }
function logout(){ sessionStorage.clear(); location.href="index.html"; }

const BASE = "/api";

// HELPER
async function apiFetch(endpoint, method="GET", body=null){
  const options = { method };
  if(body && !(body instanceof FormData)){
    options.headers = { "Content-Type": "application/json" };
    options.body = JSON.stringify(body);
  } else if(body instanceof FormData){
    options.body = body;
  }

  const res = await fetch(`${BASE}/${endpoint}`, options);
  if(!res.ok){
    throw new Error(`Request failed: ${res.status}`);
  }
  return res.json();
}

// ================= RESET FUNCTION =================
function resetFields(section){
  if(section==="speaker"){
    spName.value=""; spAff.value=""; spImg.value="";
  }
  if(section==="committee"){
    cmName.value=""; cmDes.value=""; cmImg.value="";
  }
  if(section==="publisher"){
    pubName.value=""; pubLogo.value="";
  }
  if(section==="partner"){
    partnerName.value=""; partnerLogo.value="";
  }
}

// ================= DATES =================
async function loadDates(){
  const data = await apiFetch("dates");
  const container = document.getElementById("datesList");
  container.innerHTML="";

  data.forEach(d=>{
    container.innerHTML += `
      <div class="simple-item">
        <div>${d.event} - ${d.date}</div>
        <div>
          <button class="btn-outline" onclick="editDate('${d._id}','${d.event}','${d.date}')">Edit</button>
          <button class="btn-outline" onclick="deleteDate('${d._id}')">Delete</button>
        </div>
      </div>`;
  });
}

function editDate(id,event,date){
  editMode={type:"date",id};
  eventName.value=event;
  eventDate.value=date;
}

async function addDate(){
  try{
    const event = eventName.value;
    const date = eventDate.value;

    if(editMode.type==="date"){
      await fetch(`${BASE}/dates/${editMode.id}`,{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({event,date})
      });
      showToast("Date Updated ✅");
    }else{
      await fetch(`${BASE}/dates`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({event,date})
      });
      showToast("Date Added ✅");
    }

    editMode={};
    eventName.value="";
    eventDate.value="";
    loadDates();

  }catch{
    showToast("Error ❌",false);
  }
}

async function deleteDate(id){
  await fetch(`${BASE}/dates/${id}`,{method:"DELETE"});
  loadDates();
}

// ================= SPEAKERS =================
async function loadSpeakers(){
  const data = await apiFetch("speakers");
  const container = document.getElementById("speakerList");
  container.innerHTML="";

  data.forEach(s=>{
    container.innerHTML += `
      <div class="simple-item">
        <div><img src="${s.image}"> ${s.name}</div>
        <div>
          <button class="btn-outline" onclick="editSpeaker('${s._id}','${s.name}','${s.affiliation}')">Edit</button>
          <button class="btn-outline" onclick="deleteSpeaker('${s._id}')">Delete</button>
        </div>
      </div>`;
  });
}

function editSpeaker(id,name,aff){
  editMode={type:"speaker",id};
  spName.value=name;
  spAff.value=aff;
}

async function addSpeaker(){
  try{
    const fd=new FormData();
    fd.append("name",spName.value);
    fd.append("affiliation",spAff.value);
    if(spImg.files[0]) fd.append("image",spImg.files[0]);

    if(editMode.type==="speaker"){
      await fetch(`${BASE}/speakers/${editMode.id}`,{method:"PUT",body:fd});
      showToast("Speaker Updated ✅");
    }else{
      await fetch(`${BASE}/speakers`,{method:"POST",body:fd});
      showToast("Speaker Added ✅");
    }

    editMode={};
    resetFields("speaker");
    loadSpeakers();

  }catch{
    showToast("Error ❌",false);
  }
}

async function deleteSpeaker(id){
  await fetch(`${BASE}/speakers/${id}`,{method:"DELETE"});
  loadSpeakers();
}

// ================= COMMITTEE =================
async function loadCommittee(){
  const data = await apiFetch("committee");
  const container = document.getElementById("CommitteeList");
  container.innerHTML="";

  data.forEach(c=>{
    container.innerHTML += `
      <div class="simple-item">
        <div class="item-info">
          <img src="${c.image}">
          ${c.name}
        </div>
        <div>
          <button class="btn-outline" onclick="editCommittee('${c._id}','${c.name}','${c.designation}')">Edit</button>
          <button class="btn-outline" onclick="deleteCommittee('${c._id}')">Delete</button>
        </div>
      </div>`;
  });
}

function editCommittee(id,name,des){
  editMode={type:"committee",id};
  cmName.value=name;
  cmDes.value=des;
}

async function addCommittee(){
  try{
    const fd=new FormData();
    fd.append("name",cmName.value);
    fd.append("designation",cmDes.value);
    if(cmImg.files[0]) fd.append("image",cmImg.files[0]);

    if(editMode.type==="committee"){
      await fetch(`${BASE}/committee/${editMode.id}`,{method:"PUT",body:fd});
      showToast("Committee Updated ✅");
    }else{
      await fetch(`${BASE}/committee`,{method:"POST",body:fd});
      showToast("Committee Added ✅");
    }

    editMode={};
    resetFields("committee");
    loadCommittee();

  }catch{
    showToast("Error ❌",false);
  }
}

async function deleteCommittee(id){
  await fetch(`${BASE}/committee/${id}`,{method:"DELETE"});
  loadCommittee();
}

// ================= PUBLISHERS =================
async function loadPublishers(){
  const data = await apiFetch("publishers");
  const container = document.getElementById("publisherList");
  container.innerHTML="";

  data.forEach(p=>{
    container.innerHTML += `
      <div class="simple-item">
        <div class="item-info">
          <img src="${p.logo}">
          ${p.name}
        </div>
        <div>
          <button class="btn-outline" onclick="editPublisher('${p._id}','${p.name}')">Edit</button>
          <button class="btn-outline" onclick="deletePublisher('${p._id}')">Delete</button>
        </div>
      </div>`;
  });
}

function editPublisher(id,name){
  editMode={type:"publisher",id};
  pubName.value=name;
}

async function addPublisher(){
  try{
    const fd=new FormData();
    fd.append("name",pubName.value);
    if(pubLogo.files[0]) fd.append("logo",pubLogo.files[0]);

    if(editMode.type==="publisher"){
      await fetch(`${BASE}/publishers/${editMode.id}`,{method:"PUT",body:fd});
      showToast("Publisher Updated ✅");
    }else{
      await fetch(`${BASE}/publishers`,{method:"POST",body:fd});
      showToast("Publisher Added ✅");
    }

    editMode={};
    resetFields("publisher");
    loadPublishers();

  }catch{
    showToast("Error ❌",false);
  }
}

async function deletePublisher(id){
  await fetch(`${BASE}/publishers/${id}`,{method:"DELETE"});
  loadPublishers();
}

// ================= PARTNERS =================
async function loadPartners(){
  const data = await apiFetch("partners");
  const container = document.getElementById("partnerList");
  container.innerHTML="";

  data.forEach(p=>{
    container.innerHTML += `
      <div class="simple-item">
        <div class="item-info">
          <img src="${p.logo}">
          ${p.name}
        </div>
        <div>
          <button class="btn-outline" onclick="editPartner('${p._id}','${p.name}')">Edit</button>
          <button class="btn-outline" onclick="deletePartner('${p._id}')">Delete</button>
        </div>
      </div>`;
  });
}

function editPartner(id,name){
  editMode={type:"partner",id};
  partnerName.value=name;
}

async function addPartner(){
  try{
    const fd=new FormData();
    fd.append("name",partnerName.value);
    if(partnerLogo.files[0]) fd.append("logo",partnerLogo.files[0]);

    if(editMode.type==="partner"){
      await fetch(`${BASE}/partners/${editMode.id}`,{method:"PUT",body:fd});
      showToast("Partner Updated ✅");
    }else{
      await fetch(`${BASE}/partners`,{method:"POST",body:fd});
      showToast("Partner Added ✅");
    }

    editMode={};
    resetFields("partner");
    loadPartners();

  }catch{
    showToast("Error ❌",false);
  }
}

async function deletePartner(id){
  await fetch(`${BASE}/partners/${id}`,{method:"DELETE"});
  loadPartners();
}

// ================= NAVTABS =================
async function addTab(){
  try{
    const res = await fetch(`${BASE}/tabs`);
    const existingTabs = await res.json();

    if(editMode.type!=="tab" && existingTabs.length >= 2){
      showToast("Cannot add more than 2 tabs ❌", false);
      return;
    }

    const fd = new FormData();
    fd.append("tabName", tabName.value);
    fd.append("headline", headline.value);
    fd.append("content", content.value);
    if(image.files[0]) fd.append("image", image.files[0]);

    if(editMode.type==="tab"){
      await fetch(`${BASE}/tabs/${editMode.id}`, { method: "PUT", body: fd });
      showToast("Tab Updated ✅");
    } else {
      await fetch(`${BASE}/tabs`, { method: "POST", body: fd });
      showToast("Tab Added ✅");
    }

    tabName.value = "";
    headline.value = "";
    content.value = "";
    image.value = "";
    editMode = {};

    loadTabs();

  }catch{
    showToast("Error ❌", false);
  }
}

// ================= LOAD NAV TABS =================
async function loadTabs(){
  try{
    const res = await fetch(`${BASE}/tabs`);
    const data = await res.json();

    const container = document.getElementById("tabList");
    container.innerHTML = "";

    // Disable Add button if 2 tabs exist
    const addBtn = document.querySelector("button[onclick='addTab()']");
    if(data.length >= 2){
      addBtn.disabled = true;
      addBtn.style.opacity = 0.5;
      addBtn.style.cursor = "not-allowed";
    } else {
      addBtn.disabled = false;
      addBtn.style.opacity = 1;
      addBtn.style.cursor = "pointer";
    }

    data.forEach(t=>{
      container.innerHTML += `
        <div class="simple-item">
          <div class="item-info">
            ${t.image ? `<img src="${t.image}">` : ""}
            <div>
              <b>${t.tabName}</b><br>
              <small>${t.headline}</small>
            </div>
          </div>

          <div>
            <button class="btn-outline" onclick="deleteTab('${t._id}')">Delete</button>
          </div>
        </div>
      `;
    });

  }catch{
    showToast("Failed to load tabs ❌", false);
  }
}
async function deleteTab(id){
  await fetch(`${BASE}/tabs/${id}`,{method:"DELETE"});
  showToast("Tab Deleted ✅");
  loadTabs();
}


// LOAD ALL
const speakerImageInput = document.getElementById("spImg");
const committeeImageInput = document.getElementById("cmImg");
const publisherLogoInput = document.getElementById("pubLogo");
const partnerLogoInput = document.getElementById("partnerLogo");

if (speakerImageInput) speakerImageInput.onchange = ()=> previewImage(speakerImageInput,"spPreview");
if (committeeImageInput) committeeImageInput.onchange = ()=> previewImage(committeeImageInput,"cmPreview");
if (publisherLogoInput) publisherLogoInput.onchange = ()=> previewImage(publisherLogoInput,"pubPreview");
if (partnerLogoInput) partnerLogoInput.onchange = ()=> previewImage(partnerLogoInput,"partnerPreview");

loadDates();
loadSpeakers();
loadCommittee();
loadPublishers();
loadPartners();
loadTabs();
</script>
<div id="toast" style="
position:fixed;
top:30px;
left:50%;
transform:translateX(-50%);
background:#2563EB;
color:#fff;
padding:12px 20px;
border-radius:8px;
display:none;
z-index:9999;
font-weight:600;">
</div>
</body>
</html>
