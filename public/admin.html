<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRUSTNET 2026 – Admin Dashboard</title>
<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{margin:0;background:#eef1f6;padding:40px}
.top-header{
  background:#fff;height:80px;display:flex;
  justify-content:space-between;align-items:center;
  padding:0 40px;box-shadow:0 4px 15px rgba(0,0,0,.08);
  margin:-40px -40px 40px
}
.logout{color:#2563EB;font-weight:700;text-decoration:none}
.admin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:40px}
.full-width{grid-column:1/-1}
.card{
  background:#fff;border-radius:16px;padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,.08)
}
.card h2{color:#2563EB;margin:0}
.hr{border-bottom:1px solid #dbeafe;margin:20px 0}
input{width:100%;padding:12px;margin-bottom:12px;border-radius:10px;border:1px solid #ccc}
.btn{background:#2563EB;color:#fff;border:none;padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-outline{background:#2563EB;color:#fff;border:none;padding:10px 22px;border-radius:10px;font-weight:600;cursor:pointer;white-space: nowrap;}
.simple-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 0;border-bottom:1px solid #eee;gap: 20px
}

.simple-item img{
  height:40px;width:40px;border-radius:5px;margin-right:10px;object-fit:cover;
}
.item-info{display:flex;align-items:center;gap:10px;}
.simple-item div:last-child {
  display: flex;
  gap: 10px;         /* spacing between buttons */
  flex-shrink: 0;    /* prevents wrapping */
}
</style>
</head>
<body>

<div class="top-header">
  <h1>TRUSTNET 2026 – Admin Dashboard</h1>
  <a href="#" class="logout" onclick="logout()">LOGOUT</a>
</div>

<div class="admin-grid">

<!-- IMPORTANT DATES -->
<div class="card">
<h2>Important Dates</h2><div class="hr"></div>
<input id="eventName" placeholder="Event Name">
<input id="eventDate" placeholder="Date (YYYY-MM-DD)">
<button class="btn" onclick="addDate()">Add</button>
<div class="hr"></div><div id="datesList"></div>
</div>

<!-- SPEAKERS -->
<div class="card">
<h2>Speakers</h2><div class="hr"></div>
<input id="spName" placeholder="Name">
<input id="spAff" placeholder="Affiliation">
<input type="file" id="spImg">
<button class="btn" onclick="addSpeaker()">Add</button>
<div class="hr"></div><div id="speakerList"></div>
</div>

<!-- COMMITTEE -->
<div class="card">
<h2>Committee</h2><div class="hr"></div>
<input id="cmName" placeholder="Name">
<input id="cmDes" placeholder="Designation">
<input type="file" id="cmImg">
<button class="btn" onclick="addCommittee()">Add</button>
<div class="hr"></div><div id="CommitteeList"></div>
</div>

<!-- PUBLISHERS -->
<div class="card full-width">
<h2>Publishers</h2><div class="hr"></div>
<input id="pubName" placeholder="Publisher Name">
<input type="file" id="pubLogo">
<button class="btn" onclick="addPublisher()">Add</button>
<div class="hr"></div><div id="publisherList"></div>
</div>

<!-- PARTNERS -->
<div class="card full-width">
<h2>Partners</h2><div class="hr"></div>
<input id="partnerName" placeholder="Partner Name">
<input type="file" id="partnerLogo">
<button class="btn" onclick="addPartner()">Add</button>
<div class="hr"></div><div id="partnerList"></div>
</div>

<!-- NAVIGATION TABS -->
<div class="card full-width">
  <h2>Navigation Tabs</h2>
  <div class="hr"></div>

  <input id="tabName" placeholder="Tab Name">
  <input id="headline" placeholder="Headline">
  <textarea id="content" placeholder="Content"
    style="width:100%;height:120px;padding:12px;border-radius:10px;border:1px solid #ccc;margin-bottom:12px;font-family:'Segoe UI',sans-serif;">
  </textarea>
  <input type="file" id="image">

  <button class="btn" onclick="addTab()">Add</button>

  <div class="hr"></div>
  <div id="tabList"></div>
</div>

</div>

<script>
// ====== LOGIN CHECK ======
if(sessionStorage.getItem("adminLoggedIn")!=="true"){ location.href="login.html"; }
function logout(){ sessionStorage.clear(); location.href="index.html"; }

// ====== API BASE ======
const BASE = "http://localhost:3000/api";

// ====== HELPER FUNCTIONS ======
async function apiFetch(endpoint, method="GET", body=null){
  const options = { method };
  if(body && !(body instanceof FormData)){
    options.headers = { "Content-Type": "application/json" };
    options.body = JSON.stringify(body);
  } else if(body instanceof FormData){
    options.body = body;
  }
  const res = await fetch(`${BASE}/${endpoint}`, options);
  if(!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

function renderList(containerId, data, renderItem){
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  data.forEach(item => container.appendChild(renderItem(item)));
}


// ================= DATES =================
async function loadDates(){
  const data = await apiFetch("dates");
  renderList("datesList", data, d => {
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info">${d.event} – ${d.date}</div>
      <div>
        <button class="btn-outline" onclick="editDate('${d._id}','${d.event}','${d.date}')">Edit</button>
        <button class="btn-outline" onclick="deleteDate('${d._id}')">Delete</button>
      </div>`;
    return div;
  });
}
async function addDate(){
  const event = document.getElementById("eventName").value;
  const date = document.getElementById("eventDate").value;
  if(!event || !date) return alert("Fill all fields");
  await apiFetch("dates","POST",{ event, date });
  document.getElementById("eventName").value="";
  document.getElementById("eventDate").value="";
  loadDates();
}
async function editDate(id,event,date){
  const newEvent = prompt("Event Name", event);
  const newDate = prompt("Date", date);
  if(newEvent && newDate){ await apiFetch(`dates/${id}`,"PUT",{ event:newEvent,date:newDate }); loadDates(); }
}
async function deleteDate(id){ await apiFetch(`dates/${id}`,"DELETE"); loadDates(); }
loadDates();

// ================= SPEAKERS =================
async function loadSpeakers(){
  const data = await apiFetch("speakers");
  renderList("speakerList", data, s => {
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info">
        <img src="${s.image}" alt="${s.name}"><span>${s.name} – ${s.affiliation}</span>
      </div>
      <div>
        <button class="btn-outline" onclick="editSpeaker('${s._id}','${s.name}','${s.affiliation}')">Edit</button>
        <button class="btn-outline" onclick="deleteSpeaker('${s._id}')">Delete</button>
      </div>`;
    return div;
  });
}
async function addSpeaker(){
  const name=document.getElementById("spName").value;
  const aff=document.getElementById("spAff").value;
  const img=document.getElementById("spImg").files[0];
  if(!name || !aff || !img) return alert("Fill all fields");
  const fd=new FormData(); fd.append("name",name); fd.append("affiliation",aff); fd.append("image",img);
  await apiFetch("speakers","POST",fd);
  document.getElementById("spName").value=""; document.getElementById("spAff").value=""; document.getElementById("spImg").value="";
  loadSpeakers();
}
async function editSpeaker(id,name,aff){
  const newName=prompt("Name",name); const newAff=prompt("Affiliation",aff);
  if(newName && newAff){ const fd=new FormData(); fd.append("name",newName); fd.append("affiliation",newAff); await apiFetch(`speakers/${id}`,"PUT",fd); loadSpeakers(); }
}
async function deleteSpeaker(id){ await apiFetch(`speakers/${id}`,"DELETE"); loadSpeakers(); }
loadSpeakers();

// ================= COMMITTEE =================
async function loadCommittee(){
  const data = await apiFetch("committee");
  renderList("CommitteeList", data, s => {
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info">
        <img src="${s.image}" alt="${s.name}"><span>${s.name} – ${s.designation}</span>
      </div>
      <div>
        <button class="btn-outline" onclick="editCommittee('${s._id}','${s.name}','${s.designation}')">Edit</button>
        <button class="btn-outline" onclick="deleteCommittee('${s._id}')">Delete</button>
      </div>`;
    return div;
  });
}
async function addCommittee(){
  const name=document.getElementById("cmName").value;
  const des=document.getElementById("cmDes").value;
  const img=document.getElementById("cmImg").files[0];
  if(!name || !des || !img) return alert("Fill all fields");
  const fd=new FormData(); fd.append("name",name); fd.append("designation",des); fd.append("image",img);
  await apiFetch("committee","POST",fd);
  document.getElementById("cmName").value=""; document.getElementById("cmDes").value=""; document.getElementById("cmImg").value="";
  loadCommittee();
}
async function editCommittee(id,name,des){
  const newName=prompt("Name",name); const newDes=prompt("Designation",des);
  if(newName && newDes){ const fd=new FormData(); fd.append("name",newName); fd.append("designation",newDes); await apiFetch(`committee/${id}`,"PUT",fd); loadCommittee(); }
}
async function deleteCommittee(id){ await apiFetch(`committee/${id}`,"DELETE"); loadCommittee(); }
loadCommittee();

// ================= PUBLISHERS =================
async function loadPublishers(){
  const data = await apiFetch("publishers");
  renderList("publisherList", data, p => {
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info"><img src="${p.logo}" alt="${p.name}"><span>${p.name}</span></div>
      <div>
        <button class="btn-outline" onclick="editPublisher('${p._id}','${p.name}')">Edit</button>
        <button class="btn-outline" onclick="deletePublisher('${p._id}')">Delete</button>
      </div>`;
    return div;
  });
}
async function addPublisher(){
  const name=document.getElementById("pubName").value;
  const logo=document.getElementById("pubLogo").files[0];
  if(!name || !logo) return alert("Fill all fields");
  const fd=new FormData(); fd.append("name",name); fd.append("logo",logo);
  await apiFetch("publishers","POST",fd);
  document.getElementById("pubName").value=""; document.getElementById("pubLogo").value="";
  loadPublishers();
}
async function editPublisher(id,name){ const newName=prompt("Publisher Name",name); if(newName){ const fd=new FormData(); fd.append("name",newName); await apiFetch(`publishers/${id}`,"PUT",fd); loadPublishers(); } }
async function deletePublisher(id){ await apiFetch(`publishers/${id}`,"DELETE"); loadPublishers(); }
loadPublishers();

// ================= PARTNERS =================
async function loadPartners(){
  const data = await apiFetch("partners");
  renderList("partnerList", data, p => {
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info"><img src="${p.logo}" alt="${p.name}"><span>${p.name}</span></div>
      <div>
        <button class="btn-outline" onclick="editPartner('${p._id}','${p.name}')">Edit</button>
        <button class="btn-outline" onclick="deletePartner('${p._id}')">Delete</button>
      </div>`;
    return div;
  });
}
async function addPartner(){
  const name=document.getElementById("partnerName").value;
  const logo=document.getElementById("partnerLogo").files[0];
  if(!name || !logo) return alert("Fill all fields");
  const fd=new FormData(); fd.append("name",name); fd.append("logo",logo);
  await apiFetch("partners","POST",fd);
  document.getElementById("partnerName").value=""; document.getElementById("partnerLogo").value="";
  loadPartners();
}
async function editPartner(id,name){ const newName=prompt("Partner Name",name); if(newName){ const fd=new FormData(); fd.append("name",newName); await apiFetch(`partners/${id}`,"PUT",fd); loadPartners(); } }
async function deletePartner(id){ await apiFetch(`partners/${id}`,"DELETE"); loadPartners(); }
loadPartners();




// ================= NAVIGATION =================
async function loadNav(){
  const res = await fetch(`${BASE}/navigation`);
  const data = await res.json();

  const container = document.getElementById("navList");
  container.innerHTML = "";

  data.forEach(n=>{
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info">${n.title} → ${n.link}</div>
      <div>
        <button class="btn-outline" onclick="editNav('${n._id}','${n.title}','${n.link}')">Edit</button>
        <button class="btn-outline" onclick="moveUp('${n._id}')">⬆</button>
        <button class="btn-outline" onclick="moveDown('${n._id}')">⬇</button>
        <button class="btn-outline" onclick="deleteNav('${n._id}')">Delete</button>
      </div>
    `;
    container.appendChild(div);
  });
}

async function addNav(){
  const title = document.getElementById("navTitle").value;
  const link = document.getElementById("navLink").value;

  if(!title || !link){
    alert("Fill all fields");
    return;
  }

  await fetch(`${BASE}/navigation`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ title, link })
  });

  document.getElementById("navTitle").value="";
  document.getElementById("navLink").value="";
  loadNav();
}

async function deleteNav(id){
  await fetch(`${BASE}/navigation/${id}`,{
    method:"DELETE"
  });
  loadNav();
}

async function editNav(id, oldTitle, oldLink){
  const newTitle = prompt("Edit Title", oldTitle);
  const newLink = prompt("Edit Link", oldLink);

  if(!newTitle || !newLink){
    alert("Fields cannot be empty");
    return;
  }

  await fetch(`${BASE}/navigation/${id}`,{
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ title:newTitle, link:newLink })
  });

  loadNav();
}

loadNav();

// ================= DYNAMIC PAGE =================

async function loadTabs(){
  const res = await fetch(`${BASE}/tabs`);
  const data = await res.json();

  const container = document.getElementById("tabList");
  container.innerHTML = "";

  data.forEach(t=>{
    const div = document.createElement("div");
    div.className = "simple-item";
    div.innerHTML = `
      <div class="item-info">
        <span>${t.tabName}</span>
      </div>
      <button class="btn-outline" onclick="deleteTab('${t._id}')">Delete</button>
    `;
    container.appendChild(div);
  });

  const addBtn = document.querySelector("#tabName").nextElementSibling.nextElementSibling.nextElementSibling.nextElementSibling;
  if(data.length >= 2){
    addBtn.disabled = true;
    addBtn.innerText = "Limit Reached";
  } else {
    addBtn.disabled = false;
    addBtn.innerText = "Add";
  }
}

async function addTab(){

  const res = await fetch(`${BASE}/tabs`);
  const data = await res.json();

  if(data.length >= 2){
    alert("You can only create maximum 2 tabs");
    return;
  }

  const tabName = document.getElementById("tabName").value;
  const headline = document.getElementById("headline").value;
  const content = document.getElementById("content").value;
  const image = document.getElementById("image").files[0];

  if(!tabName || !headline || !content){
    alert("Fill all fields");
    return;
  }

  const slug = tabName.toLowerCase().replace(/\s+/g,"-");

  const fd = new FormData();
  fd.append("tabName", tabName);
  fd.append("headline", headline);
  fd.append("content", content);
  fd.append("slug", slug);
  if(image) fd.append("image", image);

  await fetch(`${BASE}/tabs`, {
    method:"POST",
    body:fd
  });

  document.getElementById("tabName").value="";
  document.getElementById("headline").value="";
  document.getElementById("content").value="";
  document.getElementById("image").value="";

  loadTabs();
}

async function deleteTab(id){
  await fetch(`${BASE}/tabs/${id}`, { method:"DELETE" });
  loadTabs();
}

loadTabs();



</script>


</body>
</html>
